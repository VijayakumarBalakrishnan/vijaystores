<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay Fancy and Stores</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f5f5;
}

/* HEADER */
header {
    background: linear-gradient(45deg, #ff6f61, #ff9472);
    color: white;
    padding: 15px;
    text-align: center;
}

.logo {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.logo-icon {
    font-size: 40px;
}

/* NAV */
nav {
    background: #222;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */
.hero {
    padding: 40px 20px;
    text-align: center;
    background: #ffe0db;
}

/* PRODUCTS */
.section {
    padding: 30px 15px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3 {
    padding: 10px;
}

/* WHATSAPP BUTTON */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
}

/* FOOTER */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
}

/* MOBILE */
@media(max-width: 600px) {
    .logo h1 {
        font-size: 20px;
    }
}
</style>

</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">🛍️</div>
        <div>
            <h1>Vijay Fancy stores</h1>
        </div>
    </div>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
</nav>

<div class="hero">
    <h2>All Your Daily Needs in One Place</h2>
    <p>Quality products at affordable prices</p>
</div>

<div id="products" class="section">
    <h2 style="text-align:center;">Our Products</h2>
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1581605405669-fcdf81165afa">
            <h3>School Bags</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1588072432836-e10032774350">
            <h3>Stationery</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
            <h3>Footwear</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
            <h3>Sports Items</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0">
            <h3>Bangles</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1">
            <h3>Toys</h3>
        </div>

    </div>
</div>

<div id="contact" class="section" style="text-align:center;">
    <h2>Contact Us</h2>
    <p>📞 Call / WhatsApp: 7904450773</p>
</div>

<a class="whatsapp" href="https://wa.me/917904450773" target="_blank">💬</a>

<footer>
    <p>© 2026 Vijay Fancy and Stores</p>
</footer>

</body>
</html>
